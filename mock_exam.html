<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mock Exam</title>
    <link rel="stylesheet" href="style.css">
    <script src="questions.js"></script>
    <script src="utils.js"></script>
    <script src="mastery.js"></script>
</head>
<body>
    <div class="card">
        <div id="exam-ui">
            <div id="exam-info" style="display:flex; justify-content:space-between; font-size:0.8rem; color:gray; margin-bottom:10px;">
                <span id="p-text"></span>
                <span id="remaining-info"></span>
            </div>
            
            <div style="text-align:center; margin: 15px 0;">
                <span class="speaker-icon" onclick="speakNow()" style="font-size: 40px; cursor: pointer;">🔊</span>
            </div>
            
            <div id="q-text" class="question" style="margin-bottom:20px; min-height:60px; text-align:center;"></div>
            <input type="text" id="user-ans" placeholder="Type your answer..." autocomplete="off">
            <button class="btn" style="background:var(--success); color:white;" onclick="next()">Next Question</button>
        </div>

        <div id="result-ui" style="display:none;">
            <h1>Exam Result</h1>
            <h2 id="score" style="text-align:center; color:var(--primary); font-size:2.5rem; margin:10px 0;"></h2>
            <p id="pass-fail" style="text-align:center; font-weight:bold; margin-bottom:10px;"></p>
            
            <div id="mastery-info" style="text-align:center; font-size:0.9rem; margin-bottom:20px; color:#666;"></div>
            
            <div id="review" style="font-size:0.85rem; max-height:35vh; overflow-y:auto; border-top:1px solid #eee;"></div>
            
            <button class="btn" style="background:var(--primary); color:white; margin-top:20px;" onclick="location.reload()">Next 20 Questions</button>
            <button class="btn" style="background:var(--secondary); color:white; margin-top:10px;" onclick="resetMastery()">Reset All Progress</button>
        </div>
        <a href="index.html" class="back-link">Exit to Menu</a>
    </div>

  <script>
    // mastery.js 함수 사용
    let availableQs = getAvailableQuestions(quizData);
    
    if (availableQs.length === 0) {
        alert("Congratulations! You've mastered all questions. Resetting for review.");
        if(resetAllProgress()) location.reload();
    }

    let examCount = Math.min(20, availableQs.length);
    let qs = [...availableQs].sort(() => Math.random() - 0.5).slice(0, examCount);
    
    let idx = 0, userAns = [], sessionCorrectIds = [];

    function show() {
        document.getElementById('p-text').innerText = `QUESTION ${idx + 1} OF ${examCount}`;
        document.getElementById('remaining-info').innerText = `Remaining: ${availableQs.length}`;
        document.getElementById('q-text').innerText = qs[idx].q;
        document.getElementById('user-ans').value = "";
        document.getElementById('user-ans').focus();
        setTimeout(speakNow, 500);
    }

    function speakNow() { playQuestionAudio ? playQuestionAudio(qs[idx].id) : speakText(qs[idx].q); }

    function next() {
        const currentAns = document.getElementById('user-ans').value;
        userAns.push(currentAns);
        
        if (checkIsCorrect(currentAns, qs[idx].a, qs[idx].q)) {
            sessionCorrectIds.push(qs[idx].id);
        }
        if (++idx < examCount) show(); else finish();
    }

    function finish() {
        if(window.speechSynthesis) window.speechSynthesis.cancel();
        
        // 맞힌 문제들 일괄 저장
        saveMultipleMasteredIds(sessionCorrectIds);

        document.getElementById('exam-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        
        let score = 0, html = "";
        qs.forEach((q, i) => {
            const isCorrect = checkIsCorrect(userAns[i], q.a, q.q);
            if (isCorrect) score++;
            html += `<div style="border-bottom:1px solid #eee; padding:12px 0;">
                <div style="font-weight:bold;">${q.id}. ${q.q}</div>
                <div style="color:${isCorrect ? 'var(--success)' : '#e74c3c'}">My: ${userAns[i] || "(Empty)"} ${isCorrect ? '✓' : '✗'}</div>
                <div style="color:gray; font-size:0.8rem;">Correct: ${q.a}</div>
            </div>`;
        });

        // 통계 정보 업데이트
        const stats = getMasteryStats(quizData.length);
        document.getElementById('score').innerText = `${score} / ${examCount}`;
        document.getElementById('mastery-info').innerText = `Total Progress: ${stats.count} / ${quizData.length} Mastered (${stats.percent}%)`;
        
        const pf = document.getElementById('pass-fail');
        pf.innerText = score >= (examCount * 0.6) ? "PASSED!" : "KEEP STUDYING!";
        pf.style.color = score >= (examCount * 0.6) ? "var(--success)" : "#e74c3c";
        document.getElementById('review').innerHTML = html;
    }

    function resetMastery() {
        if(resetAllProgress()) location.reload();
    }

    document.getElementById('user-ans').addEventListener('keypress', (e) => { if(e.key==='Enter') next(); });
    show();
</script>
</body>
</html>
